<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Dashboard | kanalni.if.ua</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .rank-up {
            color: #10b981;
        }

        .rank-down {
            color: #ef4444;
        }

        .rank-same {
            color: #6b7280;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">SEO Dashboard</h1>
                <p class="text-gray-500 mt-1">Project: <span class="font-semibold text-blue-600">kanalni.if.ua</span>
                </p>
            </div>

            <div class="flex items-center space-x-4">
                <span id="lastUpdated" class="text-sm text-gray-500">Last updated: -</span>
                <button id="updateBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium shadow-sm transition-colors flex items-center">
                    Оновити позиції
                </button>
            </div>
        </div>

        <!-- Error/Status Alert -->
        <div id="statusAlert" class="hidden mb-6 p-4 rounded-lg bg-blue-50 text-blue-800 border border-blue-200">
            Status message goes here.
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Ключове слово</th>
                        <th scope="col"
                            class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Позиція (Сьогодні)</th>
                        <th scope="col"
                            class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Позиція (Минула)</th>
                        <th scope="col"
                            class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Динаміка</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">URL
                        </th>
                    </tr>
                </thead>
                <tbody id="rankingsTable" class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                            Завантаження даних...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA_FILE = 'http://localhost:3000/data';
        const API_ENDPOINT = 'http://localhost:3000/update-rankings'; // Simple local server endpoint

        const tableBody = document.getElementById('rankingsTable');
        const lastUpdatedSpan = document.getElementById('lastUpdated');
        const updateBtn = document.getElementById('updateBtn');
        const statusAlert = document.getElementById('statusAlert');

        function showStatus(message, isError = false) {
            statusAlert.textContent = message;
            statusAlert.className = `mb-6 p-4 rounded-lg border ${isError ? 'bg-red-50 text-red-800 border-red-200' : 'bg-blue-50 text-blue-800 border-blue-200'}`;
            statusAlert.classList.remove('hidden');
        }

        function renderTable(historyData) {
            // historyData format: { "2026-02-21": [ {keyword, rank, url}, ... ], "2026-02-22": [...] }
            const dates = Object.keys(historyData).sort((a, b) => new Date(b) - new Date(a));

            if (dates.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Дані відсутні. Натисніть "Оновити позиції" для першої перевірки.</td></tr>';
                return;
            }

            const latestDate = dates[0];
            const previousDate = dates.length > 1 ? dates[1] : null;

            lastUpdatedSpan.textContent = `Останнє оновлення: ${latestDate}`;

            const latestRanks = historyData[latestDate];
            const previousRanks = previousDate ? historyData[previousDate] : [];

            let html = '';

            latestRanks.forEach(item => {
                // Find in previous
                const prevItem = previousRanks.find(p => p.keyword === item.keyword);
                const prevRank = prevItem ? prevItem.rank : '-';

                // Calculate diff
                let diffHtml = '<span class="rank-same">—</span>';
                if (prevRank !== '-' && item.rank !== '100+') {
                    const pRankNum = parseInt(prevRank) || 101;
                    const cRankNum = parseInt(item.rank) || 101;

                    if (cRankNum < pRankNum) {
                        diffHtml = `<span class="rank-up font-bold">▲ +${pRankNum - cRankNum}</span>`;
                    } else if (cRankNum > pRankNum) {
                        diffHtml = `<span class="rank-down font-bold">▼ -${cRankNum - pRankNum}</span>`;
                    }
                } else if (prevRank === '-' && item.rank !== '100+') {
                    diffHtml = `<span class="rank-up font-bold">New</span>`;
                }

                // Rank styling
                const rankDisplay = item.rank === '100+' ? '<span class="text-gray-400">100+</span>' : `<span class="font-bold ${parseInt(item.rank) <= 10 ? 'text-green-600' : 'text-gray-800'}">${item.rank}</span>`;

                html += `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${item.keyword}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-center">${rankDisplay}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-gray-500">${prevRank}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-center">${diffHtml}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 truncate max-w-xs">
                        ${item.url ? `<a href="${item.url}" target="_blank" class="text-blue-500 hover:underline">${new URL(item.url).pathname}</a>` : '-'}
                    </td>
                </tr>
            `;
            });

            tableBody.innerHTML = html;
        }

        async function loadData() {
            try {
                // Add cache busting query param
                const response = await fetch(`${DATA_FILE}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Дані ще не створені або помилка доступу.');
                const data = await response.json();
                renderTable(data);
                statusAlert.classList.add('hidden');
            } catch (err) {
                console.error(err);
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">${err.message}</td></tr>`;
            }
        }

        updateBtn.addEventListener('click', async () => {
            updateBtn.disabled = true;
            const originalText = updateBtn.innerHTML;
            updateBtn.innerHTML = '<span class="loader"></span> Оновлюємо...';
            showStatus('Відправляємо запит до DataForSEO (це може зайняти 10-30 секунд)...');

            try {
                const response = await fetch(API_ENDPOINT, { method: 'POST' });
                const result = await response.json();

                if (response.ok) {
                    showStatus('Успішно оновлено! Завантажуємо нові дані...');
                    setTimeout(loadData, 1000); // Wait a second for file write to settle
                } else {
                    showStatus(`Помилка: ${result.error || 'Server error'}`, true);
                }
            } catch (err) {
                showStatus(`Помилка з'єднання: ${err.message}. Переконайтесь, що локальний сервер запущено.`, true);
            } finally {
                updateBtn.disabled = false;
                updateBtn.innerHTML = originalText;
            }
        });

        // Initial load
        loadData();
    </script>

</body>

</html>
